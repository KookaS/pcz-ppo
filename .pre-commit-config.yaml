# Layer 1: Deterministic checks that run on every commit.
# These catch classes of errors that don't need AI judgment.
# Install: pre-commit install (run once after cloning)

repos:
  # Secrets detection — blocks commits containing passwords, API keys, tokens
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Ruff — linting + formatting (replaces flake8, isort, black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-yaml
      - id: check-json
        exclude: 'devcontainer\.json$'  # JSONC (has comments)
      - id: check-toml

  # Paper numerical claims ↔ data consistency
  # If any .tex in the paper or results.csv is staged, re-run render_claims
  # in --check mode.  Fails if committed fragments under generated/ are stale
  # with respect to the current results.csv.
  - repo: local
    hooks:
      - id: pcz-render-claims-check
        name: PCZ paper claims match data (render_claims --check)
        entry: uv run python paper/render_claims.py --check
        language: system
        pass_filenames: false
        files: '^(paper/.*\.tex|paper/render_claims\.py|paper/fig_data\.py|data/results\.csv)$'

      # Second layer: flag any hand-typed mean±std or N× ratio outside \cnum{}.
      # Catches residual drift risk in prose that render_claims cannot see.
      - id: pcz-lint-hardcoded-numbers
        name: PCZ paper has no hand-typed numerical claims (lint)
        entry: uv run python paper/lint_hardcoded_numbers.py
        language: system
        pass_filenames: false
        files: '^paper/.*\.tex$'

      # Second-and-a-half layer: catch caption text that claims a seed
      # count (e.g. "3--5 seeds", "n=3") when the table body pulls
      # \cnum{*_seeds} fragments resolving to values outside that claim.
      # Closes the specific drift that bit us on 2026-04-20 when n went
      # from 5 to 10 for the cross-env block but the caption didn't.
      - id: pcz-lint-caption-drift
        name: PCZ paper table captions match fragment seed counts
        entry: uv run python paper/lint_caption_drift.py
        language: system
        pass_filenames: false
        files: '^(paper/.*\.tex|paper/generated/.*_seeds\.tex)$'

      # Figure-integrity Layer 1 safety net (winner-coverage): every
      # \cnum{X_winner|loser|direction|summary|winner_verb} reference in
      # the .tex must correspond to a paired (PCZ, PPO) emit in
      # render_claims.py.  Catches future drift where a caption uses a
      # winner-fragment that has no emitter.
      - id: pcz-lint-winner-coverage
        name: PCZ Layer-1 winner fragments have emitters
        entry: uv run python paper/lint_winner_coverage.py
        language: system
        pass_filenames: false
        files: '^(paper/.*\.tex|paper/render_claims\.py)$'

      # Figure-integrity Layer 2 (figure-claim drift detector): any
      # figure caption containing a hand-typed direction claim ("PCZ
      # wins", "PPO outperforms", etc.) must reference a data-derived
      # \cnum{} fragment within ~120 chars or be explicitly allow-listed.
      # See paper/FIGURE_INTEGRITY.md.
      - id: pcz-lint-caption-claims
        name: PCZ figure captions back direction claims with data
        entry: uv run python paper/lint_caption_claims.py
        language: system
        pass_filenames: false
        files: '^paper/.*\.tex$'

      # Figure-integrity Layer 3 (geometric sanity): render every fig_*.py
      # and verify text annotations are inside axis bounds, error bars
      # don't extend past panel edges, and legends don't bleed past the
      # figure boundary. Slow (renders 11 figures, ~30 s).
      - id: pcz-lint-figure-geometry
        name: PCZ figures have no clipped annotations / out-of-bounds error bars
        entry: uv run python paper/lint_figure_geometry.py
        language: system
        pass_filenames: false
        files: '^paper/fig_.*\.py$'

      # Figure-integrity Layer 4 (mixed-unit detector): every fig_*.py
      # must declare a UNITS module-level constant; mixed-metric figures
      # must set MIXED_UNITS_ACKNOWLEDGED=True and call out the mixing
      # in the LaTeX caption.
      - id: pcz-lint-figure-units
        name: PCZ figure UNITS declarations match captions
        entry: uv run python paper/lint_figure_units.py
        language: system
        pass_filenames: false
        files: '^(paper/fig_.*\.py|paper/pcz_ppo\.tex)$'

      # Manifest schema lint: experiment manifest.json files must be
      # config-snapshot only. Forbid prose (verdict, interpretation) and
      # numeric-result fields (results, derived_ratios, headline_metric,
      # coverage_notes); numbers belong in eval/eval_summary.json and
      # prose belongs in journal.md.
      - id: pcz-lint-manifest-schema
        name: PCZ experiment manifests are config-snapshot only
        entry: uv run python tools/lint_manifest.py
        language: system
        pass_filenames: false
        files: '^experiments/.*/manifest\.json$'

      # Third layer: full paper-build DAG staleness check.  Extends the
      # claims check to figures: each fig_*.py declares INPUTS; any
      # change to a figure script, fig_data.py, results.csv, or any
      # parquet/JSON referenced by a figure's INPUTS invalidates the
      # corresponding output hash and fails the commit.
      # PDF compile is intentionally OFF (too slow/flaky for pre-commit);
      # CI runs `paper_build.py --build --pdf` to verify PDF freshness.
      - id: pcz-paper-build-check
        name: PCZ paper figures + fragments match data (paper_build --check)
        entry: uv run python paper/paper_build.py --check
        language: system
        pass_filenames: false
        files: '^(paper/fig_.*\.py|paper/fig_data\.py|paper/render_claims\.py|paper/paper_build\.py|paper/paper_build\.lock\.json|paper/generated/.*\.tex|paper/fig_.*\.(pdf|png)|data/results\.csv|data/metrics/.*\.parquet|llm_alignment/runs/.*\.json)$'
