name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  paper-pipeline:
    name: Paper pipeline checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra torchrl

      - name: render_claims.py --check (fragments match results.csv)
        run: uv run python paper/render_claims.py --check

      - name: lint_hardcoded_numbers.py (no hand-typed claims)
        run: uv run python paper/lint_hardcoded_numbers.py

      - name: paper_build.py --check (figures match data)
        run: uv run python paper/paper_build.py --check

      - name: paper_build.py --audit --strict (no orphan figures/bib)
        run: uv run python paper/paper_build.py --audit --strict

      - name: Paper tests
        run: uv run pytest paper/tests/ -v

  smoke-test:
    name: Algorithm smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra torchrl

      - name: Smoke test PCZ-PPO (5k steps)
        run: |
          uv run python -m core.train \
            --algorithm torchrl-pcz-ppo-running \
            --env lunarlander \
            --total-timesteps 5000 \
            --no-mlflow
